<title>3-Day Split</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0d0d0d; color: #f0ebe3; font-family: 'Trebuchet MS', sans-serif; min-height: 100vh; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  button { font-family: inherit; }
  .screen { display: none; }
  .screen.active { display: block; }
  .page { max-width: 420px; margin: 0 auto; padding-bottom: 48px; }
  .sticky-header { background: #0f0f0f; border-bottom: 1px solid #1a1a1a; padding: 14px 16px 12px; position: sticky; top: 0; z-index: 10; }
  .user-toggle { display: flex; background: #080808; border-radius: 10px; padding: 3px; border: 1px solid #1a1a1a; }
  .user-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; color: #555; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .workout-btn { width: 100%; background: #121212; border: 1px solid #1a1a1a; border-radius: 13px; padding: 16px; margin-bottom: 9px; cursor: pointer; text-align: left; font-family: inherit; }
  .set-input { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 8px 4px; color: #f0ebe3; font-size: 17px; text-align: center; font-family: monospace; outline: none; }
  .set-input.done-input { background: #0f0f0f; border-color: #222; opacity: 0.5; }
  .check-btn { width: 36px; height: 36px; border-radius: 8px; border: none; background: #1e1e1e; color: #888; font-size: 17px; cursor: pointer; flex-shrink: 0; transition: all 0.15s; font-family: inherit; }
  .ghost-btn { background: none; border: none; color: #555; font-size: 17px; cursor: pointer; padding: 4px 6px; font-family: inherit; }
  .primary-btn { width: 100%; padding: 15px; border: none; border-radius: 11px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .ex-card { border-radius: 13px; padding: 14px; margin-bottom: 11px; background: #141414; border: 1px solid #1a1a1a; }
  .ex-card.friend { background: rgba(0,0,0,0.25) !important; border-color: rgba(255,255,255,0.1) !important; }
  .tag { padding: 2px 7px; background: #181818; border: 1px solid #1e1e1e; border-radius: 100px; font-size: 15px; color: #444; }
  .progress-bar-outer { height: 2px; background: #181818; }
  .progress-bar-inner { height: 100%; transition: width 0.3s; }
  .add-set-btn { margin-top: 5px; width: 100%; padding: 8px; background: transparent; border: 1px dashed #333; border-radius: 8px; color: #666; font-size: 17px; cursor: pointer; font-family: inherit; }
  .session-card { margin-bottom: 12px; background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 10px; padding: 10px 12px; }
  .set-pill { background: #141414; border: 1px solid #222; border-radius: 7px; padding: 4px 10px; font-size: 15px; color: #777; display: inline-block; margin: 2px; }
  .io-box { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
  .io-btn { flex: 1; padding: 10px; background: #1a1a1a; border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; }
  .chip-btn { background: #141414; border: 1px solid #222; border-radius: 9px; padding: 7px 12px; color: #777; font-size: 17px; cursor: pointer; font-family: inherit; }
  #duck-container { display: none; position: sticky; top: 0; z-index: 0; width: 100%; height: 600px; margin-bottom: -600px; overflow: hidden; pointer-events: none; }
  #duck-container img { width: 100%; height: 100%; object-fit: contain; object-position: center top; display: block; }
  .workout-content { position: relative; z-index: 1; }
</style>

        <button class="ghost-btn" style="color:#4a9a55;font-weight:700;" id="btn-save-edit">Save ✓</button>
      </div>
      <div id="edit-sub" style="font-size:15px;color:#555;text-align:center;margin-top:6px;"></div>
    </div>
    <div style="padding:16px;">
      <div style="display:flex;gap:6px;margin-bottom:8px;padding-left:32px;">
        <div style="width:110px;font-size:15px;color:#777;text-align:center;letter-spacing:0.1em;">KG</div>
        <div style="width:64px;font-size:15px;color:#777;text-align:center;letter-spacing:0.1em;">REPS</div>
      </div>
      <div id="edit-sets"></div>
      <button class="add-set-btn" id="btn-edit-add-set">+ Add Set</button>
    </div>
  </div>
</div>

<script>
const WORKOUTS = {
  A: { label:'Workout A', day:'Monday', focus:'Heavy Compounds', exercises:[
    {name:'Squats / Leg Press',muscle:'Quads/Glutes',sets:3,repRange:'5–8'},
    {name:'Flat DB Bench Press',muscle:'Chest',sets:3,repRange:'6–9'},
    {name:'Pull-Ups / Lat Pulldowns',muscle:'Lats',sets:3,repRange:'6–9'},
    {name:'DB Overhead Press',muscle:'Shoulders',sets:3,repRange:'6–9'},
    {name:'Leg Curls',muscle:'Hamstrings',sets:2,repRange:'8–10'},
    {name:'Cable Lateral Raises',muscle:'Side Delts',sets:2,repRange:'10–12'},
    {name:'Face Pulls',muscle:'Rear Delts',sets:2,repRange:'12–15'}
  ]},
  B: { label:'Workout B', day:'Wednesday', focus:'Posterior Chain', exercises:[
    {name:'Deadlifts / RDLs',muscle:'Hamstrings/Back',sets:2,repRange:'5–8'},
    {name:'Incline DB Press',muscle:'Upper Chest',sets:3,repRange:'7–10'},
    {name:'Seated Cable Row',muscle:'Mid-Back',sets:3,repRange:'8–10'},
    {name:'Barbell / DB Shrugs',muscle:'Traps',sets:2,repRange:'10–12'},
    {name:'DB Side Laterals',muscle:'Side Delts',sets:3,repRange:'10–12'},
    {name:'Bicep Curls',muscle:'Biceps',sets:2,repRange:'8–10'},
    {name:'Tricep Pushdowns',muscle:'Triceps',sets:2,repRange:'8–10'}
  ]},
  C: { label:'Workout C', day:'Friday', focus:'Isolation & Volume', exercises:[
    {name:'Leg Extensions',muscle:'Quads',sets:2,repRange:'10–12'},
    {name:'Chest Press Machine',muscle:'Chest',sets:2,repRange:'8–10'},
    {name:'Single-Arm Cable Rows',muscle:'Back',sets:2,repRange:'10–12'},
    {name:'High-Incline DB Press',muscle:'Front Delts',sets:2,repRange:'8–10'},
    {name:'Leaning Cable Laterals',muscle:'Side Delts',sets:3,repRange:'10–12'},
    {name:'Rear Delt Flyes',muscle:'Rear Delts',sets:2,repRange:'12–15'},
    {name:'Calf Raises',muscle:'Calves',sets:3,repRange:'12–15'}
  ]}
};

const USERS = ['You','Friend'];
const USER_COLORS = ['#e05c2a','#2a9de0'];
const CARD_ACCENT = {A:'#e05c2a',B:'#2a9de0',C:'#2ae07a'};
const STORAGE_KEY = 'wt_history_v4';

let history = {};
let currentWorkout = null;
let activeUser = 'You';
let logs = {};
let doneSets = {};
let histUser = 'You';
let histWorkout = 'A';
let histEx = null;
let editState = null;

function saveHist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {} }
function loadHist() { try { const d = localStorage.getItem(STORAGE_KEY); if(d) history = JSON.parse(d); } catch(e) {} }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(id === 'screen-history') renderHistory();
}

// Wire up all buttons safely (no inline onclick with special chars)
function wireButtons() {
  document.getElementById('btn-history').addEventListener('click', () => showScreen('screen-history'));
  document.getElementById('btn-back-workout').addEventListener('click', () => showScreen('screen-home'));
  document.getElementById('btn-done-top').addEventListener('click', finishWorkout);
  document.getElementById('finish-btn').addEventListener('click', finishWorkout);
  document.getElementById('btn-you').addEventListener('click', () => switchUser('You'));
  document.getElementById('btn-friend').addEventListener('click', () => switchUser('Friend'));
  document.getElementById('btn-summary-history').addEventListener('click', () => showScreen('screen-history'));
  document.getElementById('btn-summary-home').addEventListener('click', () => showScreen('screen-home'));
  document.getElementById('btn-back-history').addEventListener('click', () => showScreen('screen-home'));
  document.getElementById('btn-export').addEventListener('click', exportHistory);
  document.getElementById('btn-export2').addEventListener('click', exportHistory);
  document.getElementById('import-input').addEventListener('change', importHistory);
  document.getElementById('btn-cancel-edit').addEventListener('click', () => showScreen('screen-history'));
  document.getElementById('btn-save-edit').addEventListener('click', saveEditedSession);
  document.getElementById('btn-edit-add-set').addEventListener('click', editAddSet);
  document.getElementById('hist-btn-you').addEventListener('click', () => switchHistUser('You'));
  document.getElementById('hist-btn-friend').addEventListener('click', () => switchHistUser('Friend'));
}

function renderHomeCards() {
  const c = document.getElementById('workout-cards');
  c.innerHTML = '';
  Object.entries(WORKOUTS).forEach(([key, w]) => {
    const btn = document.createElement('button');
    btn.className = 'workout-btn';
    btn.style.borderLeft = '3px solid ' + CARD_ACCENT[key];
    btn.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:15px;color:#555;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px;">${w.day}</div>
          <div style="font-size:23px;color:#f0ebe3;font-weight:700;">${w.label}</div>
          <div style="font-size:17px;color:#666;margin-top:2px;">${w.focus}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:28px;color:${CARD_ACCENT[key]};font-weight:700;">${w.exercises.length}</div>
          <div style="font-size:15px;color:#444;">exercises</div>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:5px;flex-wrap:wrap;">
        ${w.exercises.slice(0,4).map(e=>`<span class="tag">${e.muscle}</span>`).join('')}
        ${w.exercises.length>4?`<span class="tag">+${w.exercises.length-4}</span>`:''}
      </div>`;
    btn.addEventListener('click', () => startWorkout(key));
    c.appendChild(btn);
  });
}

function renderHistoryTabs() {
  const c = document.getElementById('workout-tab-btns');
  c.innerHTML = '';
  Object.keys(WORKOUTS).forEach(k => {
    const btn = document.createElement('button');
    btn.id = 'hist-tab-' + k;
    btn.textContent = k;
    btn.style.cssText = 'flex:1;padding:7px;border-radius:8px;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid #1a1a1a;background:#141414;color:#555;';
    btn.addEventListener('click', () => switchHistWorkout(k));
    c.appendChild(btn);
  });
}

function startWorkout(key) {
  currentWorkout = key;
  activeUser = 'You';
  doneSets = {};
  logs = {};
  USERS.forEach(u => {
    logs[u] = {};
    WORKOUTS[key].exercises.forEach(ex => {
      logs[u][ex.name] = Array.from({length:ex.sets}, ()=>({weight:'',reps:''}));
    });
  });
  document.getElementById('wk-label').textContent = WORKOUTS[key].label;
  document.getElementById('wk-sub').textContent = WORKOUTS[key].day + ' · ' + WORKOUTS[key].focus;
  showScreen('screen-workout');
  renderWorkout();
}

function switchUser(u) { activeUser = u; renderWorkout(); }

function renderWorkout() {
  const isFriend = activeUser === 'Friend';
  const w = WORKOUTS[currentWorkout];
  const uColor = isFriend ? USER_COLORS[1] : USER_COLORS[0];

  // Duck bg
  document.getElementById('duck-container').style.display = isFriend ? 'block' : 'none';

  // User toggle buttons
  document.getElementById('btn-you').innerHTML = `You <span style="opacity:0.75;font-size:15px;">${countDone('You')}/${countTotal('You')}</span>`;
  document.getElementById('btn-friend').innerHTML = `Friend <span style="opacity:0.75;font-size:15px;">${countDone('Friend')}/${countTotal('Friend')}</span>`;
  document.getElementById('btn-you').style.background = activeUser==='You' ? USER_COLORS[0] : 'transparent';
  document.getElementById('btn-you').style.color = activeUser==='You' ? '#fff' : '#555';
  document.getElementById('btn-friend').style.background = activeUser==='Friend' ? USER_COLORS[1] : 'transparent';
  document.getElementById('btn-friend').style.color = activeUser==='Friend' ? '#fff' : '#555';

  // Progress bar
  const tot = countTotal(activeUser), dn = countDone(activeUser);
  document.getElementById('progress-bar').style.width = (tot>0?(dn/tot)*100:0) + '%';
  document.getElementById('progress-bar').style.background = uColor;
  document.getElementById('finish-btn').style.background = uColor;

  // Build exercises using DOM (no inline event handlers with special chars)
  const container = document.getElementById('exercises-container');
  container.innerHTML = '';

  w.exercises.forEach((ex, exIdx) => {
    const sets = logs[activeUser][ex.name];
    const last = getLastSession(activeUser, ex.name);

    const card = document.createElement('div');
    card.className = 'ex-card' + (isFriend ? ' friend' : '');

    // Header
    const hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;';
    hdr.innerHTML = `
      <div>
        <div style="font-size:17px;font-weight:700;color:#fff;">${ex.name}</div>
        <div style="font-size:15px;color:${isFriend?'#fff':'#777'};margin-top:2px;">${ex.muscle} · ${ex.repRange} reps</div>
      </div>
      <div style="font-size:15px;color:${isFriend?'#fff':'#666'};" class="set-count-${exIdx}">${sets.length} sets</div>`;
    card.appendChild(hdr);

    // Last session
    if(last) {
      const lastDiv = document.createElement('div');
      lastDiv.style.cssText = 'background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:7px 11px;margin-bottom:10px;';
      lastDiv.innerHTML = `<div style="font-size:14px;color:${isFriend?'#fff':'#666'};letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Last · ${last.date}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${last.sets.map(s=>`<span style="font-size:15px;color:${uColor};background:${uColor}20;border:1px solid ${uColor}40;border-radius:6px;padding:2px 7px;">${s.weight||'—'}kg × ${s.reps||'—'}</span>`).join('')}</div>`;
      card.appendChild(lastDiv);
    }

    // Col headers
    const colHdr = document.createElement('div');
    colHdr.style.cssText = 'display:flex;gap:6px;margin-bottom:5px;';
    colHdr.innerHTML = `<div style="width:26px;"></div>
      <div style="width:110px;font-size:15px;color:${isFriend?'#fff':'#777'};text-align:center;letter-spacing:0.1em;">KG</div>
      <div style="width:64px;font-size:15px;color:${isFriend?'#fff':'#777'};text-align:center;letter-spacing:0.1em;">REPS</div>
      <div style="width:36px;"></div><div style="width:26px;"></div>`;
    card.appendChild(colHdr);

    // Sets container
    const setsDiv = document.createElement('div');
    setsDiv.id = 'sets-' + exIdx;
    card.appendChild(setsDiv);

    // Add set button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-set-btn';
    addBtn.textContent = '+ Add Set';
    if(isFriend) { addBtn.style.borderColor = 'rgba(255,255,255,0.2)'; addBtn.style.color = 'rgba(255,255,255,0.5)'; }
    addBtn.addEventListener('click', () => {
      logs[activeUser][ex.name].push({weight:'',reps:''});
      renderWorkout();
    });
    card.appendChild(addBtn);
    container.appendChild(card);

    // Render set rows
    renderSetRows(exIdx, ex, isFriend, uColor);
  });
}

function renderSetRows(exIdx, ex, isFriend, uColor) {
  const setsDiv = document.getElementById('sets-' + exIdx);
  if(!setsDiv) return;
  setsDiv.innerHTML = '';
  const sets = logs[activeUser][ex.name];

  sets.forEach((s, i) => {
    const d = isDone(activeUser, ex.name, i);
    const isExtra = i >= ex.sets;
    const row = document.createElement('div');
    row.style.cssText = `display:flex;align-items:center;gap:6px;margin-bottom:5px;opacity:${d?0.4:1};transition:opacity 0.2s;`;

    // Set number circle
    const circle = document.createElement('div');
    circle.style.cssText = `width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;`;
    circle.style.background = isExtra ? uColor+'30' : (isFriend ? 'rgba(0,0,0,0.25)' : '#0f0f0f');
    circle.style.border = '1px solid ' + (isExtra ? uColor : (isFriend ? 'rgba(255,255,255,0.15)' : '#222'));
    circle.style.color = (isFriend || isExtra) ? uColor : '#888';
    circle.textContent = i+1;
    row.appendChild(circle);

    // KG input
    const kgInput = document.createElement('input');
    kgInput.type = 'number';
    kgInput.inputMode = 'decimal';
    kgInput.className = 'set-input' + (d?' done-input':'');
    kgInput.style.width = '110px';
    kgInput.value = s.weight;
    kgInput.placeholder = '—';
    kgInput.addEventListener('change', (e) => { logs[activeUser][ex.name][i].weight = e.target.value; });
    kgInput.addEventListener('input', (e) => { logs[activeUser][ex.name][i].weight = e.target.value; });
    row.appendChild(kgInput);

    // Reps input
    const repInput = document.createElement('input');
    repInput.type = 'number';
    repInput.inputMode = 'decimal';
    repInput.className = 'set-input' + (d?' done-input':'');
    repInput.style.width = '64px';
    repInput.value = s.reps;
    repInput.placeholder = '—';
    repInput.addEventListener('change', (e) => { logs[activeUser][ex.name][i].reps = e.target.value; });
    repInput.addEventListener('input', (e) => { logs[activeUser][ex.name][i].reps = e.target.value; });
    row.appendChild(repInput);

    // Check button
    const checkBtn = document.createElement('button');
    checkBtn.className = 'check-btn';
    checkBtn.textContent = '✓';
    checkBtn.style.background = d ? uColor : (isFriend ? 'rgba(0,0,0,0.25)' : '#1e1e1e');
    checkBtn.style.color = d ? '#fff' : '#888';
    checkBtn.addEventListener('click', () => {
      const k = activeUser+'||'+ex.name+'||'+i;
      doneSets[k] = !doneSets[k];
      renderWorkout();
    });
    row.appendChild(checkBtn);

    // Remove button (extra sets only)
    if(isExtra) {
      const rmBtn = document.createElement('button');
      rmBtn.style.cssText = 'width:26px;height:26px;border-radius:6px;border:none;background:#1a1a1a;color:#555;font-size:17px;cursor:pointer;flex-shrink:0;';
      rmBtn.textContent = '×';
      rmBtn.addEventListener('click', () => {
        logs[activeUser][ex.name].splice(i, 1);
        delete doneSets[activeUser+'||'+ex.name+'||'+i];
        renderWorkout();
      });
      row.appendChild(rmBtn);
    }

    setsDiv.appendChild(row);
  });
}

function isDone(user, ex, idx) { return !!doneSets[user+'||'+ex+'||'+idx]; }
function countDone(user) { return Object.keys(doneSets).filter(k=>k.startsWith(user+'||')&&doneSets[k]).length; }
function countTotal(user) { if(!logs[user]) return 0; return Object.values(logs[user]).reduce((a,s)=>a+s.length,0); }
function getLastSession(user, exName) { const s=history?.[user]?.[exName]; return s?.length?s[s.length-1]:null; }

function finishWorkout() {
  const today = new Date().toISOString().split('T')[0];
  const w = WORKOUTS[currentWorkout];
  USERS.forEach(user => {
    if(!history[user]) history[user]={};
    w.exercises.forEach(ex => {
      const sets = (logs[user]?.[ex.name]||[]).filter(s=>s.weight||s.reps);
      if(sets.length) {
        if(!history[user][ex.name]) history[user][ex.name]=[];
        history[user][ex.name].push({date:today,sets:[...sets]});
      }
    });
  });
  saveHist();
  renderSummary();
  showScreen('screen-summary');
}

function renderSummary() {
  const w = WORKOUTS[currentWorkout];
  document.getElementById('summary-sub').textContent = w.label + ' · ' + w.day;
  document.getElementById('summary-content').innerHTML = USERS.map((user,ui)=>`
    <div style="background:#141414;border:1px solid ${USER_COLORS[ui]}2a;border-radius:13px;padding:15px;margin-bottom:12px;">
      <div style="font-size:15px;color:${USER_COLORS[ui]};letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;">${user}</div>
      ${w.exercises.map(ex=>{
        const sets=logs[user]?.[ex.name]||[];
        return `<div style="margin-bottom:9px;">
          <div style="font-size:15px;color:#666;margin-bottom:4px;">${ex.name}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;">
            ${sets.map((s,i)=>`<div style="background:${isDone(user,ex.name,i)?USER_COLORS[ui]+'18':'#0f0f0f'};border:1px solid ${isDone(user,ex.name,i)?USER_COLORS[ui]+'44':'#1e1e1e'};border-radius:7px;padding:3px 9px;font-size:15px;color:${isDone(user,ex.name,i)?USER_COLORS[ui]:'#3a3a3a'};">${s.weight||'—'}kg × ${s.reps||'—'}</div>`).join('')}
          </div></div>`;
      }).join('')}
    </div>`).join('');
}

function switchHistUser(u) {
  histUser = u; histEx = null;
  ['You','Friend'].forEach((name,i)=>{
    const btn=document.getElementById('hist-btn-'+name.toLowerCase());
    btn.style.background=histUser===name?USER_COLORS[i]:'transparent';
    btn.style.color=histUser===name?'#fff':'#555';
  });
  renderHistory();
}

function switchHistWorkout(k) {
  histWorkout=k; histEx=null;
  Object.keys(WORKOUTS).forEach(wk=>{
    const btn=document.getElementById('hist-tab-'+wk);
    if(btn){btn.style.background=histWorkout===wk?CARD_ACCENT[wk]+'22':'#141414';btn.style.color=histWorkout===wk?CARD_ACCENT[wk]:'#555';btn.style.borderColor=histWorkout===wk?CARD_ACCENT[wk]+'55':'#1a1a1a';}
  });
  renderHistory();
}

function getBestSet(sets) {
  if(!sets?.length) return null;
  return sets.reduce((b,s)=>((parseFloat(s.weight)||0)*(parseInt(s.reps)||0))>((parseFloat(b.weight)||0)*(parseInt(b.reps)||0))?s:b,sets[0]);
}

function renderSparkline(data,color){
  const W=72,H=28,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${H-((v-min)/range)*(H-4)-2}`).join(' ');
  const last=pts.split(' ').pop().split(',');
  return `<svg width="${W}" height="${H}" style="overflow:visible;display:block;flex-shrink:0;"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/><circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${color}"/></svg>`;
}

function renderChart(points,color,exName){
  const W=280,H=100,P=12;
  const maxW=Math.max(...points.map(p=>p.w)),minW=Math.min(...points.map(p=>p.w)),range=maxW-minW||1;
  const coords=points.map((p,i)=>({x:P+(i/Math.max(points.length-1,1))*(W-P*2),y:P+(1-(p.w-minW)/range)*(H-P*2),...p}));
  const pathD=coords.map((c,i)=>`${i===0?'M':'L'}${c.x},${c.y}`).join(' ');
  const areaD=`${pathD} L${coords[coords.length-1].x},${H} L${coords[0].x},${H} Z`;
  const uid=exName.replace(/\W/g,'');
  const labelEvery=points.length>8?3:points.length>4?2:1;
  const gain=(points[points.length-1].w-points[0].w).toFixed(1);
  return `<div style="display:flex;justify-content:space-between;margin-bottom:6px;">
    <div style="font-size:15px;color:#444;">Start: <span style="color:#aaa;">${points[0].w}kg</span></div>
    <div style="font-size:15px;color:${color};">Now: <span style="font-weight:700;">${points[points.length-1].w}kg</span> <span style="color:#555;">(+${gain}kg)</span></div></div>
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block;">
      <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.22"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
      <path d="${areaD}" fill="url(#g${uid})"/>
      <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${coords.map((c,i)=>`<circle cx="${c.x}" cy="${c.y}" r="3.5" fill="${color}" opacity="${i===0||i===coords.length-1?1:0.6}"/>`).join('')}
    </svg>
    <div style="display:flex;justify-content:space-around;margin-top:6px;">
      ${points.map((p,i)=>i%labelEvery===0||i===points.length-1?`<div style="text-align:center;"><div style="font-size:13px;color:${i===points.length-1?color:'#555'};font-weight:${i===points.length-1?700:400};">${p.w}kg</div><div style="font-size:11px;color:#333;">${p.date.slice(5)}</div></div>`:'<div></div>').join('')}
    </div>`;
}

function renderHistory() {
  ['You','Friend'].forEach((name,i)=>{
    const btn=document.getElementById('hist-btn-'+name.toLowerCase());
    if(btn){btn.style.background=histUser===name?USER_COLORS[i]:'transparent';btn.style.color=histUser===name?'#fff':'#555';}
  });
  Object.keys(WORKOUTS).forEach(wk=>{
    const btn=document.getElementById('hist-tab-'+wk);
    if(btn){btn.style.background=histWorkout===wk?CARD_ACCENT[wk]+'22':'#141414';btn.style.color=histWorkout===wk?CARD_ACCENT[wk]:'#555';btn.style.borderColor=histWorkout===wk?CARD_ACCENT[wk]+'55':'#1a1a1a';}
  });

  const hW=WORKOUTS[histWorkout];
  const hColor=USER_COLORS[USERS.indexOf(histUser)];
  if(!histEx) histEx=hW.exercises[0].name;

  const exListEl=document.getElementById('ex-list');
  exListEl.innerHTML='';
  hW.exercises.forEach(ex=>{
    const sessions=history?.[histUser]?.[ex.name]||[];
    const last=sessions[sessions.length-1];
    const best=last?getBestSet(last.sets.filter(s=>s.weight)):null;
    const isActive=histEx===ex.name;
    const sparkData=sessions.map(s=>{const b=getBestSet(s.sets.filter(x=>x.weight));return b?parseFloat(b.weight):0;}).filter(v=>v>0);
    const gain=sparkData.length>=2?(sparkData[sparkData.length-1]-sparkData[0]).toFixed(1):null;

    const btn=document.createElement('button');
    btn.style.cssText=`width:100%;background:${isActive?hColor+'0e':'#111'};border:1px solid ${isActive?hColor+'40':'#1a1a1a'};border-radius:10px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;text-align:left;margin-bottom:6px;font-family:inherit;`;
    btn.innerHTML=`<div style="flex:1;">
      <div style="font-size:17px;color:${isActive?'#f0ebe3':'#777'};font-weight:${isActive?700:400};">${ex.name}</div>
      <div style="display:flex;gap:10px;margin-top:2px;">
        ${best?`<span style="font-size:15px;color:#555;">Last: ${best.weight}kg × ${best.reps}</span>`:`<span style="font-size:15px;color:#2a2a2a;">No data yet</span>`}
        ${gain!==null?`<span style="font-size:15px;color:${parseFloat(gain)>0?'#4a9a55':'#888'};">${parseFloat(gain)>0?'+':''}${gain}kg</span>`:''}
      </div></div>
      ${sparkData.length>=2?renderSparkline(sparkData,isActive?hColor:'#2a2a2a'):''}`;
    btn.addEventListener('click',()=>{histEx=ex.name;renderHistory();});
    exListEl.appendChild(btn);
  });

  const sessions=history?.[histUser]?.[histEx]||[];
  const points=sessions.map(s=>{const b=getBestSet(s.sets.filter(x=>x.weight&&x.reps));return{date:s.date,w:b?parseFloat(b.weight):0};}).filter(p=>p.w>0);

  let chartHTML=`<div style="font-size:17px;color:#f0ebe3;font-weight:700;">${histEx}</div>
    <div style="font-size:15px;color:#444;margin-bottom:16px;margin-top:2px;">Top set weight over time</div>`;
  chartHTML+=points.length>=2?renderChart(points,hColor,histEx):`<div style="color:#444;font-size:15px;padding:12px 0;">No data yet — log some sessions first.</div>`;

  if(sessions.length>0){
    chartHTML+=`<div style="margin-top:20px;border-top:1px solid #1a1a1a;padding-top:14px;">
      <div style="font-size:15px;color:#444;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Session Log</div>`;
    [...sessions].reverse().forEach((s,ri)=>{
      const realIdx=sessions.length-1-ri;
      chartHTML+=`<div class="session-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
          <div style="font-size:15px;color:#666;">${s.date}</div>
          <div style="display:flex;gap:8px;" id="session-btns-${realIdx}"></div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${s.sets.map(st=>`<span class="set-pill">${st.weight||'—'}kg × ${st.reps||'—'}</span>`).join('')}</div>
      </div>`;
    });
    chartHTML+=`</div>`;
  }

  document.getElementById('chart-area').innerHTML=chartHTML;

  // Wire session edit/delete buttons safely after render
  if(sessions.length>0){
    [...sessions].reverse().forEach((s,ri)=>{
      const realIdx=sessions.length-1-ri;
      const btnContainer=document.getElementById('session-btns-'+realIdx);
      if(!btnContainer) return;
      const editBtn=document.createElement('button');
      editBtn.style.cssText='background:#1a1a1a;border:1px solid rgba(42,157,224,0.27);border-radius:6px;padding:4px 12px;color:#2a9de0;font-size:15px;cursor:pointer;font-family:inherit;';
      editBtn.textContent='Edit';
      editBtn.addEventListener('click',()=>startEditSession(histUser,histEx,realIdx));
      const delBtn=document.createElement('button');
      delBtn.style.cssText='background:#1a1a1a;border:1px solid rgba(224,92,42,0.27);border-radius:6px;padding:4px 12px;color:#e05c2a;font-size:15px;cursor:pointer;font-family:inherit;';
      delBtn.textContent='Delete';
      delBtn.addEventListener('click',()=>deleteSession(histUser,histEx,realIdx));
      btnContainer.appendChild(editBtn);
      btnContainer.appendChild(delBtn);
    });
  }
}

function startEditSession(user,exName,idx){
  const s=history[user][exName][idx];
  editState={user,exName,sessionIdx:idx,sets:JSON.parse(JSON.stringify(s.sets))};
  document.getElementById('edit-sub').textContent=exName+' · '+s.date;
  renderEditSets();
  showScreen('screen-edit');
}

function renderEditSets(){
  const c=document.getElementById('edit-sets');
  c.innerHTML='';
  editState.sets.forEach((s,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:8px;';
    const circle=document.createElement('div');
    circle.style.cssText='width:26px;height:26px;border-radius:50%;background:#111;border:1px solid #222;display:flex;align-items:center;justify-content:center;font-size:15px;color:#555;flex-shrink:0;';
    circle.textContent=i+1;
    const kg=document.createElement('input');
    kg.type='number';kg.inputMode='decimal';kg.className='set-input';kg.style.width='110px';kg.value=s.weight;kg.placeholder='—';
    kg.addEventListener('input',e=>{editState.sets[i].weight=e.target.value;});
    const rp=document.createElement('input');
    rp.type='number';rp.inputMode='decimal';rp.className='set-input';rp.style.width='64px';rp.value=s.reps;rp.placeholder='—';
    rp.addEventListener('input',e=>{editState.sets[i].reps=e.target.value;});
    const rm=document.createElement('button');
    rm.style.cssText='width:32px;height:32px;border-radius:7px;border:none;background:#1e1e1e;color:#e05c2a;font-size:17px;cursor:pointer;flex-shrink:0;';
    rm.textContent='×';
    rm.addEventListener('click',()=>{editState.sets.splice(i,1);renderEditSets();});
    row.appendChild(circle);row.appendChild(kg);row.appendChild(rp);row.appendChild(rm);
    c.appendChild(row);
  });
}

function editAddSet(){editState.sets.push({weight:'',reps:''});renderEditSets();}

function saveEditedSession(){
  const{user,exName,sessionIdx,sets}=editState;
  history[user][exName][sessionIdx].sets=sets;
  saveHist();editState=null;
  showScreen('screen-history');renderHistory();
}

function deleteSession(user,exName,idx){
  if(!confirm('Delete this session?')) return;
  history[user][exName].splice(idx,1);
  saveHist();renderHistory();
}

function exportHistory(){
  const blob=new Blob([JSON.stringify(history,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='workout_history_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();URL.revokeObjectURL(url);
}

function importHistory(e){
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const msg=document.getElementById('import-msg');
    try{
      history=JSON.parse(ev.target.result);saveHist();
      msg.style.display='block';msg.style.color='#4a9a55';msg.textContent='✓ History imported successfully!';
      renderHistory();setTimeout(()=>{msg.style.display='none';},3000);
    }catch{
      msg.style.display='block';msg.style.color='#e05c2a';msg.textContent='⚠ Invalid file.';
      setTimeout(()=>{msg.style.display='none';},4000);
    }
  };
  reader.readAsText(file);e.target.value='';
}

// Boot
loadHist();
wireButtons();
renderHomeCards();
renderHistoryTabs();
</script>
</body></html>
